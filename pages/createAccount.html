<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Create Account</title>
		<link rel="icon" href="../assets/img/logo.svg" />
		<link rel="stylesheet" href="../assets/css/style.css" />
		<script src="https://unpkg.com/feather-icons"></script>
	</head>
	<body>
		<section class="form">
			<div class="form__img">
				<img
					src="../assets/img/reading-glasses-pana.svg"
					alt=""
				/>
			</div>

			<div class="form__content">
				<form id="form">
					<legend>
						<img src="../assets/img/logo.svg" alt="" />
						<h1>Olá! Bem-vindo a Access Book</h1>
					</legend>

					<label for="name">Nome Completo</label>
					<input type="name" id="name" name="name" />
					<span class="required"
						>Nome deve ter no mínimo 10 caracteres</span
					>

					<label for="email">Email</label>
					<input type="email" id="email" name="email" />
					<span class="required">Email incorreto</span>

					<label for="password">Senha</label>
					<input
						type="password"
						id="password"
						name="password"
					/>
					<span class="required">Senha incorreta</span>

					<button type="submit">Criar conta</button>

					<div class="form__footer">
						<span
							>Já possui uma conta? clique em<a
								href="login.html"
							>
								Entrar.</a
							></span
						>
						<span class="return_to_project">
							Voltar ao
							<a href="../index.html">Projeto</a></span
						>
					</div>
				</form>
			</div>
		</section>
		<script src="../assets/scripts/validationForm.js"></script>
	</body>
</html>
