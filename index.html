<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Access Books</title>
		<link rel="icon" href="./assets/img/logo.svg" />
		<link rel="stylesheet" href="./assets/css/style.css" />

		<!-- LIBS -->
		<script src="https://unpkg.com/scrollreveal"></script>
		<!-- ICONS -->
		<script src="https://unpkg.com/feather-icons"></script>
	</head>
	<body>
		<header class="header__main">
			<nav>
				<ul>
					<li>
						<a href=""
							><img src="./assets/img/logotype.svg" alt=""
						/></a>
					</li>
					<div class="toggle">
						<li>
							<a href="./pages/createAccount.html"
								>Sing Up</a
							>
						</li>
						<li>
							<button>
								<a href="./pages/login.html">Login</a>
							</button>
						</li>
					</div>
					<li class="toggle__mobile">
						<i data-feather="menu"></i>
					</li>
				</ul>
			</nav>
		</header>
		<main>
			<section class="home">
				<h1>
					Bem-vindo ao Access Books, encontre seu livro
					aqui!
				</h1>
				<p>
					Um projeto com intuito de praticar de forma
					atenciosa, a funcionalidade da API que a google
					disponibiliza para os usuários que utilizam a
					plataforma Google Livros. O principal objetivo é
					construir uma estrutura de pesquisa.
				</p>
				<div class="section__search">
					<i data-feather="search"></i>
					<input
						type="text"
						placeholder="Titulo, nome do autor, editora..."
						id="input-search"
						autocomplete="off"
					/>
				</div>
			</section>

			<section class="books">
				<ul class="books__all"></ul>
			</section>
		</main>

		<script src="assets/scripts/index.js"></script>
	</body>
</html>
